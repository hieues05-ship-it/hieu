<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--o); }
  }

  .center {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .name {
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    user-select: none;
    background: linear-gradient(135deg, #f9c784, #f06e88, #c77dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    transition: transform 0.2s ease, filter 0.2s ease;
    position: relative;
  }

  .name::after {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, #f06e88, transparent);
    margin-top: 8px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .name:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  .name:hover::after {
    opacity: 1;
  }

  .hint {
    color: rgba(255,255,255,0.3);
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 1.5rem;
    transition: opacity 0.5s;
  }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    align-items: center;
    justify-content: center;
    transition: background 0.4s ease, backdrop-filter 0.4s ease;
  }

  .overlay.active {
    display: flex;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    animation: fadein 0.4s ease forwards;
  }

  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .photo-wrap {
    position: relative;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes popIn {
    from { transform: scale(0.6) rotate(-4deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .photo-wrap img {
    max-width: min(360px, 80vw);
    max-height: 70vh;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 2px rgba(240,110,136,0.4);
    display: block;
  }

  .close-btn {
    position: absolute;
    top: -14px;
    right: -14px;
    width: 36px;
    height: 36px;
    background: #f06e88;
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(240,110,136,0.5);
    transition: transform 0.2s ease;
  }

  .close-btn:hover { transform: scale(1.15) rotate(90deg); }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="center">
  <div class="name" id="nameBtn" onclick="showPhoto()">Minhy</div>
  <div class="hint">Nguyễn Đức Minh Thy</div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
    s.style.setProperty('--o', (0.3 + Math.random() * 0.7).toFixed(2));
    s.style.animationDelay = (Math.random() * 4) + 's';
    starsEl.appendChild(s);
  }

  function showPhoto() {
    document.getElementById('overlay').classList.add('active');
  }

  function hidePhoto(e) {
    if (!e || e.target === document.getElementById('overlay') || e.currentTarget === document.querySelector('.close-btn')) {
      document.getElementById('overlay').classList.remove('active');
    }
  }
</script>
